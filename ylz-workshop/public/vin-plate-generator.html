<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLZ VIN Plate Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6f9;--surface:#fff;--surface2:#f0f2f5;--border:#dfe3ea;
  --accent:#1a56db;--accent-light:#e8edfb;--accent-hover:#1648b8;
  --text:#1a1d26;--text2:#6b7280;--text3:#9ca3af;
  --success:#059669;--success-bg:#ecfdf5;--success-border:#a7f3d0;
  --warn:#d97706;--warn-bg:#fffbeb;
  --danger:#dc2626;--danger-bg:#fef2f2;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:32px 24px 80px}

/* Header */
.header{margin-bottom:32px}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
h1{font-size:22px;font-weight:700;color:var(--text)}
.subtitle{color:var(--text2);font-size:14px;margin-left:52px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .num{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* Selectors */
.selector-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:600px){.selector-grid{grid-template-columns:1fr}}
.selector-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.option-cards{display:flex;gap:8px}
.option-card{
  flex:1;padding:12px 8px;border:2px solid var(--border);border-radius:8px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);
  font-size:14px;font-weight:600;color:var(--text2);user-select:none;
}
.option-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.option-card.selected{border-color:var(--accent);background:var(--accent);color:#fff}
.option-card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.option-card .sub{font-size:10px;font-weight:500;margin-top:2px;opacity:.7}

/* Data preview */
.data-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.data-field{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;transition:border-color .2s;position:relative}
.data-field:hover{border-color:var(--accent)}
.data-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.data-value{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);outline:none;min-height:18px;border:none;background:transparent;width:100%}
.data-value:focus{color:var(--accent)}
.data-field .edit-icon{position:absolute;top:8px;right:8px;font-size:10px;color:var(--text3);opacity:0;transition:opacity .2s}
.data-field:hover .edit-icon{opacity:1}

/* VIN Table */
.vin-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.vin-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);text-align:left;padding:0 8px 4px}
.vin-table td{padding:0 4px}
.vin-table input{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:13px;outline:none;transition:border .2s;width:100%;
}
.vin-table input:focus{border-color:var(--accent);background:#fff}
.vin-table input::placeholder{color:var(--text3);font-family:'Inter',sans-serif;font-size:12px}
.vin-table .num{width:28px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);font-weight:600}
.vin-table .date-col{width:110px}
.vin-table .rm-col{width:40px}
.remove-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--danger);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.remove-btn:hover{background:var(--danger-bg);border-color:var(--danger)}
.add-vin{
  border:1px dashed var(--border);border-radius:8px;padding:10px;text-align:center;
  cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .2s;
  background:transparent;width:100%;margin-top:4px;
}
.add-vin:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* Buttons */
.actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.btn{
  padding:12px 24px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;
  font-weight:600;border:none;cursor:pointer;transition:all .2s;display:flex;
  align-items:center;gap:8px;
}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);box-shadow:var(--shadow-lg)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}

/* Status */
.status{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:16px;display:none;font-weight:500}
.status.ok{display:block;background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.status.error{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5}
.status.info{display:block;background:var(--accent-light);color:var(--accent);border:1px solid #bfdbfe}

/* Output */
.output{margin-top:20px;display:none}
.file-list{display:flex;flex-direction:column;gap:6px}
.file-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);transition:all .2s;
}
.file-item:hover{border-color:var(--accent);box-shadow:var(--shadow-lg)}
.file-icon{font-size:20px;flex-shrink:0}
.file-name{font-family:'JetBrains Mono',monospace;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-dl{
  padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.3px;border:none;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .2s;text-decoration:none;background:var(--danger-bg);color:var(--danger);
}
.file-dl:hover{background:#fecaca}
.dl-all-btn{
  padding:10px 20px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);
  font-family:'Inter',sans-serif;font-weight:600;background:var(--surface);color:var(--text);
  transition:all .2s;margin-bottom:12px;
}
.dl-all-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Preview */
.preview-wrap{margin-top:20px;overflow-x:auto;display:none}
.plate-preview{
  width:520px;height:340px;background:#e7e8e9;border:2px solid #373535;
  border-radius:14px;padding:20px 32px;font-family:'JetBrains Mono',monospace;
  font-size:11.5px;position:relative;margin:0 auto;
}
.plate-preview .corner{position:absolute;width:12px;height:12px;border-radius:50%;background:#c0c2c5;border:1px solid #999}
.plate-row{display:flex;margin-bottom:6px;align-items:center}
.plate-label{width:100px;font-size:10.5px;color:#444;flex-shrink:0}
.plate-value{background:#d4d5d8;padding:2px 10px;border-radius:3px;color:#222;font-weight:600;font-size:11px}
.plate-heading{text-align:center;font-size:9.5px;color:#444;margin:8px 0 4px;letter-spacing:.5px}
.plate-cta-row{display:flex;justify-content:space-between;gap:8px}
.plate-cta{background:#d4d5d8;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;color:#222;flex:1;text-align:center}
.plate-mfr{text-align:center;font-size:11px;font-weight:700;color:#333;position:absolute;bottom:24px;left:0;right:0}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.warn-badge{display:inline-block;background:var(--warn-bg);color:var(--warn);font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:6px}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-row">
      <div class="logo">YLZ</div>
      <h1>VIN Plate Generator</h1>
    </div>
    <p class="subtitle">Select configuration, enter VINs, and generate PDF plates — no file uploads needed</p>
  </div>

  <!-- Step 1: Configuration -->
  <div class="card">
    <div class="card-title"><span class="num">1</span> Trailer Configuration</div>
    <div class="selector-grid">
      <div class="selector-group">
        <label>Number of Axles</label>
        <div class="option-cards" id="axleOptions">
          <div class="option-card" data-value="3" onclick="selectOption('axles',3,this)">3<div class="sub">DT3</div></div>
          <div class="option-card" data-value="4" onclick="selectOption('axles',4,this)">4<div class="sub">DT4</div></div>
          <div class="option-card" data-value="5" onclick="selectOption('axles',5,this)">5<div class="sub">DT5</div></div>
          <div class="option-card" data-value="6" onclick="selectOption('axles',6,this)">6<div class="sub">DT6</div></div>
        </div>
      </div>
      <div class="selector-group">
        <label>Brand</label>
        <div class="option-cards" id="brandOptions">
          <div class="option-card" data-value="SAF" onclick="selectOption('brand','SAF',this)">SAF</div>
          <div class="option-card" data-value="TMC" onclick="selectOption('brand','TMC',this)">TMC</div>
        </div>
      </div>
      <div class="selector-group">
        <label>Brake Type</label>
        <div class="option-cards" id="brakeOptions">
          <div class="option-card" data-value="DISC" onclick="selectOption('brake','DISC',this)">Disc</div>
          <div class="option-card" data-value="DRUM" onclick="selectOption('brake','DRUM',this)">Drum</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Auto-populated data -->
  <div class="card" id="dataCard" style="display:none">
    <div class="card-title"><span class="num">2</span> Plate Data <span style="font-weight:400;text-transform:none;font-size:11px;color:var(--text3)">— click any value to edit</span></div>
    <div class="data-grid" id="dataGrid"></div>
  </div>

  <!-- Step 3: VINs -->
  <div class="card" id="vinCard" style="display:none">
    <div class="card-title"><span class="num">3</span> VIN Numbers & Dates</div>
    <table class="vin-table">
      <thead><tr><th style="width:28px">#</th><th>VIN (17 characters)</th><th class="date-col">Date (MM/YY)</th><th class="rm-col"></th></tr></thead>
      <tbody id="vinBody">
        <tr><td class="num">1</td><td><input type="text" class="vin-input" placeholder="Enter VIN number" maxlength="17" oninput="this.value=this.value.toUpperCase()"></td><td class="date-col"><input type="text" class="date-input" placeholder="MM/YY" maxlength="5"></td><td class="rm-col"><button class="remove-btn" onclick="removeVin(this)">×</button></td></tr>
      </tbody>
    </table>
    <button class="add-vin" onclick="addVin()">+ Add another VIN</button>
    <div class="actions">
      <button class="btn btn-primary" id="generateBtn" onclick="generate()"><span id="genLabel">Generate Files</span></button>
      <button class="btn btn-secondary" onclick="generateOrderForm()">Download Order Form</button>
      <button class="btn btn-secondary" onclick="downloadTEBS()">Download TEBS Datasheet</button>
      <button class="btn btn-secondary" onclick="previewPlate()">Preview Plate</button>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="preview-wrap" id="previewWrap"></div>
  <div class="output" id="output">
    <div class="card">
      <div class="card-title" style="color:var(--success)"><span class="num" style="background:var(--success)">✓</span> Generated Files</div>
      <button class="dl-all-btn" onclick="downloadAllZip()">Download All as ZIP</button>
      <div class="file-list" id="fileList"></div>
    </div>
  </div>
</div>

// ==================== STATE ====================
let config = { axles: null, brand: null, brake: null };
let currentData = null;
let generatedFiles = [];

// ==================== SELECTORS ====================
function selectOption(group, value, el) {
  config[group] = value;
  el.parentElement.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateAvailability();
  tryPopulate();
}

function updateAvailability() {
  // 5-axle and 6-axle are SAF only (no TMC)
  const tmcCards = document.querySelectorAll('#brandOptions .option-card');
  if (config.axles === 5 || config.axles === 6) {
    tmcCards[1].classList.add('disabled');
    tmcCards[1].title = `No TMC configuration for ${config.axles}-axle`;
    if (config.brand === 'TMC') {
      config.brand = null;
      tmcCards[1].classList.remove('selected');
    }
  } else {
    tmcCards[1].classList.remove('disabled');
    tmcCards[1].title = '';
  }
}

function tryPopulate() {
  if (!config.axles || !config.brand || !config.brake) {
    document.getElementById('dataCard').style.display = 'none';
    document.getElementById('vinCard').style.display = 'none';
    return;
  }
  const key = `${config.axles}-${config.brand}-${config.brake}`;
  const data = LOOKUP[key];
  if (!data) {
    showStatus('Configuration not available', 'error');
    return;
  }
  currentData = { ...data };
  hideStatus();
  showDataCard();
  document.getElementById('vinCard').style.display = 'block';
  document.getElementById('vinCard').classList.add('fade-in');
}

function showDataCard() {
  const card = document.getElementById('dataCard');
  const grid = document.getElementById('dataGrid');
  card.style.display = 'block';
  card.classList.add('fade-in');

  const fields = [
    ['makeModel', 'Make-Model'],
    ['vta', 'VTA'],
    ['variant', 'Variant'],
    ['manufacturer', 'Manufacturer'],
    ['atm', 'ATM (kg)'],
    ['gtm', 'GTM (kg)'],
    ['fb1', 'FB Row 1'],
    ['ss1', 'SS Row 1'],
    ['cs1', 'CS Row 1'],
    ['fb2', 'FB Row 2'],
    ['ss2', 'SS Row 2'],
    ['cs2', 'CS Row 2']
  ];

  grid.innerHTML = fields.map(([k, l]) => {
    const isTBC = currentData[k] === 'TBC' || (currentData[k] && currentData[k].startsWith('TBC'));
    return `<div class="data-field${isTBC ? ' tbc' : ''}">
      <span class="data-label">${l}${isTBC ? ' <span class="warn-badge">TBC</span>' : ''}</span>
      <input class="data-value" type="text" data-key="${k}" value="${currentData[k] || ''}"
        oninput="currentData['${k}']=this.value">
      <span class="edit-icon">✎</span>
    </div>`;
  }).join('');
}

// ==================== VIN TABLE ====================
function addVin() {
  const body = document.getElementById('vinBody');
  const n = body.rows.length + 1;
  const tr = document.createElement('tr');
  tr.className = 'fade-in';
  tr.innerHTML = `<td class="num">${n}</td><td><input type="text" class="vin-input" placeholder="Enter VIN number" maxlength="17" oninput="this.value=this.value.toUpperCase()"></td><td class="date-col"><input type="text" class="date-input" placeholder="MM/YY" maxlength="5"></td><td class="rm-col"><button class="remove-btn" onclick="removeVin(this)">×</button></td>`;
  body.appendChild(tr);
}

function removeVin(btn) {
  const body = document.getElementById('vinBody');
  if (body.rows.length > 1) { btn.closest('tr').remove(); renumber(); }
}

function renumber() {
  document.querySelectorAll('#vinBody .num').forEach((el, i) => el.textContent = i + 1);
}

function getEntries() {
  return [...document.querySelectorAll('#vinBody tr')].map(r => ({
    vin: r.querySelector('.vin-input').value.trim().toUpperCase(),
    date: r.querySelector('.date-input').value.trim()
  })).filter(e => e.vin);
}

// ==================== STATUS ====================
function showStatus(m, t) { const s = document.getElementById('status'); s.textContent = m; s.className = 'status ' + t; }
function hideStatus() { document.getElementById('status').className = 'status'; }

// ==================== PREVIEW ====================

async function generateOrderFormExcel(data) {
  const key = `${config.axles}-${config.brand}-${config.brake}`;
  const cellsToSet = ORDER_CELL_MAP[key];
  if (!cellsToSet) { showStatus('No order form mapping for this config', 'error'); return null; }

  // Load the template
  const zip = await JSZip.loadAsync(ORDER_TEMPLATE_DATA, {base64: true});
  let sheet2xml = await zip.file('xl/worksheets/sheet2.xml').async('string');

  // Reset ALL toggle cells to 0, then set the ones we need to 1
  ALL_TOGGLE_CELLS.forEach(cell => {
    const pattern = new RegExp(`(<c r="${cell}"[^>]*t="b"[^>]*><v>)([01])(</v></c>)`);
    const newVal = cellsToSet[cell] ? '1' : '0';
    sheet2xml = sheet2xml.replace(pattern, `$1${newVal}$3`);
  });

  // Also ensure A81 (shock absorber) stays 1 as default
  sheet2xml = sheet2xml.replace(
    /(<c r="A81"[^>]*t="b"[^>]*><v>)[01](<\/v><\/c>)/,
    '$11$2'
  );

  zip.file('xl/worksheets/sheet2.xml', sheet2xml);

  return await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.ms-excel.sheet.macroEnabled.12'
  });
}

async function generateOrderForm() {
  if (!currentData) { showStatus('Select a configuration first', 'error'); return; }
  showStatus('Generating order form...', 'info');
  try {
    const blob = await generateOrderFormExcel(currentData);
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ORDER_FORM_${config.axles}axle_${config.brand}_${config.brake}.xlsm`;
    a.click();
    showStatus('Order form downloaded — open in Excel to see auto-populated fields', 'ok');
  } catch(err) {
    console.error(err);
    showStatus('Error generating order form: ' + err.message, 'error');
  }
}

// ==================== GENERATE VIN PLATE PDF ====================
function makePDF(vin, v) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210, pw = 200, ph = 130, px = (W - pw) / 2, py = (H - ph) / 2;

  // Background
  doc.setFillColor(231, 232, 233);
  doc.roundedRect(px, py, pw, ph, 5, 5, 'F');
  doc.setDrawColor(55, 53, 53);
  doc.setLineWidth(0.6);
  doc.roundedRect(px, py, pw, ph, 5, 5, 'S');

  // Corner rivets
  doc.setFillColor(192, 194, 197);
  doc.setDrawColor(153, 153, 153);
  doc.setLineWidth(0.3);
  [[px+5,py+5],[px+pw-5,py+5],[px+5,py+ph-5],[px+pw-5,py+ph-5]].forEach(([cx,cy]) => doc.circle(cx, cy, 2.5, 'FD'));

  doc.setTextColor(50, 50, 50);
  const lx = px + 16;
  let y = py + 22;

  // Make-Model
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.text('MAKE-MODEL', lx, y);
  doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.text(v.makeModel || '', px + pw / 2, y, { align: 'center' });

  // VTA & Date
  y += 14;
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.text('VTA', lx, y);
  doc.setFont('helvetica', 'bold'); doc.text(v.vta || '', lx + 28, y);
  doc.setFont('helvetica', 'normal'); doc.text('DATE', px + pw / 2 + 18, y);
  doc.setFont('helvetica', 'bold'); doc.text(v.plateDate || '', px + pw / 2 + 42, y);

  // ATM & GTM
  y += 14;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  doc.text('ATM', lx, y); doc.setFont('helvetica', 'bold'); doc.text(v.atm || '', lx + 28, y);
  doc.setFont('helvetica', 'normal'); doc.text('kg', lx + 55, y);
  doc.text('GTM', px + pw / 2 + 18, y); doc.setFont('helvetica', 'bold'); doc.text(v.gtm || '', px + pw / 2 + 42, y);
  doc.setFont('helvetica', 'normal'); doc.text('kg', px + pw / 2 + 70, y);

  // VIN
  y += 14;
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.text('VIN', px + pw / 2 - 30, y);
  doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.text(vin, px + pw / 2 + 2, y, { align: 'center' });

  // Brake heading
  y += 14;
  doc.setFontSize(7.5); doc.setFont('helvetica', 'normal');
  doc.text('BRAKE SYSTEM COMPONENT TYPE APPROVAL NUMBERS', px + pw / 2, y, { align: 'center' });

  // CTA rows
  const cw = pw / 3;
  y += 10;
  doc.setFontSize(9); doc.setFont('helvetica', 'bold');
  doc.text(v.fb1 || '', px + cw * 0.5, y, { align: 'center' });
  doc.text(v.ss1 || '', px + cw * 1.5, y, { align: 'center' });
  doc.text(v.cs1 || '', px + cw * 2.5, y, { align: 'center' });
  y += 10;
  doc.text(v.fb2 || '', px + cw * 0.5, y, { align: 'center' });
  doc.text(v.ss2 || '', px + cw * 1.5, y, { align: 'center' });
  doc.text(v.cs2 || '', px + cw * 2.5, y, { align: 'center' });

  // Manufacturer
  doc.setFontSize(10);
  doc.text(v.manufacturer || '', px + pw / 2, py + ph - 14, { align: 'center' });

  return doc.output('blob');
}

async function generate() {
  if (!currentData) { showStatus('Select a configuration first', 'error'); return; }
  const entries = getEntries();
  if (!entries.length) { showStatus('Enter at least one VIN', 'error'); return; }
  for (const e of entries) {
    if (e.vin.length !== 17) { showStatus(`VIN "${e.vin}" must be exactly 17 characters`, 'error'); return; }
    if (!e.date) { showStatus(`Enter a date for VIN ${e.vin}`, 'error'); return; }
  }

  const btn = document.getElementById('generateBtn'), lbl = document.getElementById('genLabel');
  btn.disabled = true;
  lbl.innerHTML = '<span class="spinner"></span> Generating...';

  try {
    generatedFiles = [];
    // Generate order form first
    const orderBlob = await generateOrderFormExcel(currentData);
    if (orderBlob) {
      generatedFiles.push({ name: `ORDER_FORM_${config.axles}axle_${config.brand}_${config.brake}.xlsm`, blob: orderBlob, type: 'xlsm', isOrder: true });
    }
    // Generate TEBS datasheet
    const tebsBlob = await generateTEBSDocx(currentData);
    if (tebsBlob) {
      generatedFiles.push({ name: `TEBS_DATASHEET_${config.axles}axle_${config.brand}_${config.brake}.docx`, blob: tebsBlob, type: 'docx', isTebs: true });
    }
    // Generate VIN plates
    for (const entry of entries) {
      const v = { ...currentData, plateDate: entry.date };
      const blob = makePDF(entry.vin, v);
      generatedFiles.push({ name: `VIN_PLATE_${entry.vin}.pdf`, blob, type: 'pdf' });
    }
    renderOutput();
    showStatus(`Generated ${entries.length} VIN plate${entries.length > 1 ? 's' : ''} + order form + TEBS datasheet successfully`, 'ok');
  } catch (err) {
    console.error(err);
    showStatus('Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    lbl.textContent = 'Generate Files';
  }
}

function renderOutput() {
  const out = document.getElementById('output'), list = document.getElementById('fileList');
  out.style.display = 'block';
  list.innerHTML = '';
  generatedFiles.forEach((f, i) => {
    const url = URL.createObjectURL(f.blob);
    const d = document.createElement('div');
    d.className = 'file-item fade-in';
    d.style.animationDelay = (i * 60) + 'ms';
    const icon = f.isOrder ? '📋' : f.isTebs ? '📝' : '📄';
    const badge = f.isOrder ? '<span style="background:var(--accent-light);color:var(--accent);font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px">ORDER FORM</span>' : f.isTebs ? '<span style="background:#fff3cd;color:#856404;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:6px">TEBS DATASHEET</span>' : '';
    const dlLabel = f.isOrder ? 'XLSM' : f.isTebs ? 'DOCX' : 'PDF';
    d.innerHTML = `<span class="file-icon">${icon}</span><span class="file-name">${f.name}${badge}</span><span style="color:var(--text3);font-size:11px">${(f.blob.size / 1024).toFixed(1)} KB</span><a href="${url}" download="${f.name}" class="file-dl">${dlLabel}</a>`;
    list.appendChild(d);
  });
  out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function downloadAllZip() {
  if (generatedFiles.length < 2) {
    // Just download the single file directly
    const f = generatedFiles[0];
    const a = document.createElement('a');
    a.href = URL.createObjectURL(f.blob);
    a.download = f.name;
    a.click();
    return;
  }
  const z = new JSZip();
  generatedFiles.forEach(f => z.file(f.name, f.blob));
  const b = await z.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'VIN_Plates.zip';
  a.click();

async function generateTEBSDocx(data) {
  const key = `${config.axles}-${config.brand}-${config.brake}`;
  const tebs = TEBS_DATA[key];
  if (!tebs) { showStatus('No TEBS data for this config', 'error'); return null; }

  const zip = await JSZip.loadAsync(TEBS_TEMPLATE_DATA, {base64: true});
  let docXml = await zip.file('word/document.xml').async('string');

  // Simple placeholder replacements
  const replacements = {
    '{{BRAKE_SARN}}': tebs.brakeSarn,
    '{{FRONT_AXLE_COUNT}}': tebs.frontAxles,
    '{{REAR_AXLE_COUNT}}': tebs.rearAxles,
    '{{TEETH_1}}': tebs.teeth1,
    '{{TEETH_2}}': tebs.teeth2,
    '{{SUSP_SARN_F}}': tebs.suspSarnF,
    '{{SUSP_SARN_R}}': tebs.suspSarnR,
    '{{SUSP_MAKE_F}}': tebs.suspMakeF,
    '{{SUSP_MAKE_R}}': tebs.suspMakeR,
    '{{SUSP_MODEL_F}}': tebs.suspModelF,
    '{{SUSP_MODEL_R}}': tebs.suspModelR,
    '{{RIDE_HEIGHT_F}}': tebs.rideHeightF,
    '{{RIDE_HEIGHT_R}}': tebs.rideHeightR,
    '{{AIRBAG_F}}': tebs.airbagF,
    '{{AIRBAG_R}}': tebs.airbagR,
    '{{AXLE_SARN_F}}': tebs.axleSarnF,
    '{{AXLE_SARN_R}}': tebs.axleSarnR,
    '{{AXLE_MAKE_F}}': tebs.axleMakeF,
    '{{AXLE_MAKE_R}}': tebs.axleMakeR,
    '{{AXLE_MODEL_F}}': tebs.axleModelF,
    '{{AXLE_MODEL_R}}': tebs.axleModelR,
    '{{TYRE_F}}': tebs.tyreF,
    '{{TYRE_R}}': tebs.tyreR,
    '{{MFR_NAME}}': 'YLZ Truck Bodies',
    '{{FEATURES}}': tebs.features,
    '{{UTM_F}}': tebs.utmF,
    '{{LADEN_F}}': tebs.ladenF,
    '{{UTM_R}}': tebs.utmR,
    '{{LADEN_R}}': tebs.ladenR,
  };

  // VIN and date from user input (first entry)
  const entries = getEntries();
  const firstVin = entries.length > 0 ? entries[0].vin : '';
  const firstDate = entries.length > 0 ? entries[0].date : '';
  replacements['{{VIN}}'] = firstVin;
  replacements['{{PROD_DATE}}'] = firstDate;
  replacements['{{DECL_NAME}}'] = '';
  replacements['{{DECL_SIG}}'] = '';
  replacements['{{DECL_DATE}}'] = firstDate;

  // Booster info per axle (1-6)
  for (let i = 0; i < 6; i++) {
    replacements[`{{BOOSTER_BRAND_${i+1}}}`] = tebs.boosterBrand[i] || '';
    replacements[`{{BOOSTER_SIZE_${i+1}}}`] = tebs.boosterSize[i] || '';
    replacements[`{{SAL_${i+1}}}`] = tebs.sal[i] || '';
  }

  // Sensor checkmarks
  const checkmark = '\u2611';
  const sensorRows = ['cd','ef','mod','lift','steer'];
  for (const row of sensorRows) {
    const vals = tebs.sensors[row];
    for (let i = 0; i < 6; i++) {
      replacements[`{{${row.toUpperCase()}_AX${i+1}}}`] = vals[i] ? '\u2611' : '';
    }
  }

  // Apply all replacements
  for (const [placeholder, value] of Object.entries(replacements)) {
    docXml = docXml.split(placeholder).join(value);
  }

  zip.file('word/document.xml', docXml);
  return await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
}
